# cargo-deny 配置文件
# 用于检查依赖的许可证、安全漏洞和其他问题

[advisories]
# 安全漏洞检查
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"  # 发现漏洞时失败
unmaintained = "warn"   # 未维护的包警告
unsound = "warn"        # 不安全的包警告
yanked = "deny"         # 禁止使用已撤回的包
notice = "warn"         # 通知级别的问题

[licenses]
# 许可证检查
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
copyleft = "warn"
allow-osi-fsf-free = "both"
default = "deny"
confidence-threshold = 0.8

[bans]
# 禁止使用的包
multiple-versions = "warn"  # 多版本依赖警告
wildcards = "warn"          # 通配符版本警告
highlight = "all"

# 可以在这里添加特定的禁止包
# [[bans.deny]]
# name = "openssl"
# wrappers = []

[sources]
# 源检查
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
