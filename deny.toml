# cargo-deny 配置文件
# 用于检查依赖的许可证、安全漏洞和其他问题
# 文档: https://embarkstudios.github.io/cargo-deny/

[graph]
# 检查所有目标平台
all-features = false
no-default-features = false

[advisories]
# 安全漏洞检查
# 忽略的安全警告 - 这些是上游依赖的问题，本项目无法直接修复
ignore = [
    # instant - 被 futures-lite (gpui 依赖) 使用，上游尚未更新
    { id = "RUSTSEC-2024-0384", reason = "上游依赖 gpui/futures-lite 尚未更新" },
    # paste - 被 gpui-component, metal, rav1e 使用
    { id = "RUSTSEC-2024-0436", reason = "上游依赖 gpui-component/metal 尚未更新" },
    # serial - 被 portable-pty 使用
    { id = "RUSTSEC-2017-0008", reason = "上游依赖 portable-pty 尚未更新" },
]

[licenses]
# 许可证检查
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

# 私有 crate 配置
[licenses.private]
ignore = true

[bans]
# 禁止使用的包
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# 跳过重复版本检查的包
skip = []
skip-tree = []

[sources]
# 源检查
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
