# Cargo configuration for zTerm

[build]
# Use all available CPU cores
jobs = -1
# Share target directory across all worktrees
target-dir = "C:/Users/zero/.cargo-target/axon_term"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[alias]
# Development aliases
dev = "run -p z_term"
check-all = "check --workspace --all-targets"
test-all = "test --workspace"
clippy-all = "clippy --workspace --all-targets -- -D warnings"

[env]
# Environment variables for development
RUST_BACKTRACE = "1"
