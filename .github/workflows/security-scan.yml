name: 定期安全扫描

on:
  # 每周一 UTC 时间 0:00 运行（减少频率，CI 已覆盖日常检查）
  schedule:
    - cron: '0 0 * * 1'
  # 允许手动触发
  workflow_dispatch:

jobs:
  # 代码静态分析（仅安全相关的额外检查，CI 已有基础 Clippy）
  static-analysis:
    name: 静态代码分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Linux 依赖安装
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 运行 Clippy (安全相关检查)
        run: |
          cargo clippy --workspace --all-targets --all-features --message-format=json -- \
            -W clippy::all \
            -W clippy::pedantic \
            -W clippy::nursery \
            -W clippy::cargo \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::unimplemented \
            -W clippy::todo \
            > clippy-report.json || true

      - name: 上传 Clippy 报告
        uses: actions/upload-artifact@v4
        with:
          name: clippy-security-report
          path: clippy-report.json

  # 代码复杂度分析（unsafe 代码检测）
  complexity-analysis:
    name: 代码复杂度分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 cargo-geiger (检测不安全代码)
        run: cargo install cargo-geiger --locked

      - name: Linux 依赖安装
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 扫描不安全代码
        run: |
          # cargo-geiger 在某些依赖上有兼容性警告，使用 || true 忽略退出码
          # 报告仍会正常生成
          cargo geiger --manifest-path ${{ github.workspace }}/crates/z_term/Cargo.toml --output-format GitHubMarkdown > geiger-report.md 2>&1 || true

      - name: 上传 Geiger 报告
        uses: actions/upload-artifact@v4
        with:
          name: unsafe-code-report
          path: geiger-report.md

  # 生成安全报告摘要
  security-summary:
    name: 生成安全报告
    needs: [static-analysis, complexity-analysis]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 创建安全摘要
        run: |
          echo "# 安全扫描报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 扫描结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 静态分析 (安全检查): ${{ needs.static-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unsafe 代码分析: ${{ needs.complexity-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 注: 依赖审计和供应链检查已整合到 CI workflow 中" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "扫描时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
