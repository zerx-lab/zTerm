name: 定期安全扫描

on:
  # 每天 UTC 时间 0:00 运行
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:
  # PR 合并到主分支时也运行
  push:
    branches: [main]

jobs:
  # 依赖安全审计
  dependency-audit:
    name: 依赖安全审计
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 cargo-audit
        run: cargo install cargo-audit --locked

      - name: 运行安全审计
        id: audit
        run: |
          cargo audit --json > audit-report.json
          cargo audit
        continue-on-error: true

      - name: 上传审计报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-report
          path: audit-report.json

      - name: 创建 Issue (如果发现漏洞)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));

            if (report.vulnerabilities && report.vulnerabilities.list.length > 0) {
              const vulns = report.vulnerabilities.list;
              let body = '## 🚨 检测到安全漏洞\n\n';
              body += `发现 ${vulns.length} 个安全漏洞：\n\n`;

              vulns.forEach(v => {
                body += `### ${v.advisory.id}: ${v.advisory.title}\n`;
                body += `- **包**: ${v.advisory.package}\n`;
                body += `- **版本**: ${v.versions.patched.join(', ')}\n`;
                body += `- **严重程度**: ${v.advisory.severity || 'Unknown'}\n`;
                body += `- **描述**: ${v.advisory.description}\n`;
                body += `- **URL**: ${v.advisory.url}\n\n`;
              });

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Security] 检测到 ${vulns.length} 个安全漏洞`,
                body: body,
                labels: ['security', 'vulnerability', 'automated']
              });
            }

  # 代码静态分析
  static-analysis:
    name: 静态代码分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Linux 依赖安装
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 运行 Clippy (安全相关检查)
        run: |
          cargo clippy --workspace --all-targets --all-features --message-format=json -- \
            -W clippy::all \
            -W clippy::pedantic \
            -W clippy::nursery \
            -W clippy::cargo \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::unimplemented \
            -W clippy::todo \
            > clippy-report.json || true

      - name: 上传 Clippy 报告
        uses: actions/upload-artifact@v4
        with:
          name: clippy-security-report
          path: clippy-report.json

  # 供应链安全检查
  supply-chain:
    name: 供应链安全检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 cargo-deny
        run: cargo install cargo-deny --locked

      - name: 检查供应链安全
        run: |
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check sources
          cargo deny check bans

  # 代码复杂度分析
  complexity-analysis:
    name: 代码复杂度分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 cargo-geiger (检测不安全代码)
        run: cargo install cargo-geiger --locked

      - name: Linux 依赖安装
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 扫描不安全代码
        run: |
          # cargo-geiger 在某些依赖上有兼容性警告，使用 || true 忽略退出码
          # 报告仍会正常生成
          cargo geiger --manifest-path ${{ github.workspace }}/crates/z_term/Cargo.toml --output-format GitHubMarkdown > geiger-report.md 2>&1 || true

      - name: 上传 Geiger 报告
        uses: actions/upload-artifact@v4
        with:
          name: unsafe-code-report
          path: geiger-report.md

  # 生成安全报告摘要
  security-summary:
    name: 生成安全报告
    needs: [dependency-audit, static-analysis, supply-chain, complexity-analysis]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 创建安全摘要
        run: |
          echo "# 安全扫描报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 扫描结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 依赖审计: ${{ needs.dependency-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 静态分析: ${{ needs.static-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 供应链检查: ${{ needs.supply-chain.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 复杂度分析: ${{ needs.complexity-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "扫描时间: $(date -u)" >> $GITHUB_STEP_SUMMARY
