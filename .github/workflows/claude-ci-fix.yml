name: Claude CI Auto-Fix

on:
  # 当 CI workflow 完成时触发（CI 已包含代码审查）
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # 也可以通过 PR 评论手动触发
  issue_comment:
    types: [created]

env:
  MAX_FIX_ATTEMPTS: 3

jobs:
  # 检查是否需要自动修复
  check-if-fix-needed:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude fix ci'))
    outputs:
      should_fix: ${{ steps.check.outputs.should_fix }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      attempt_count: ${{ steps.check.outputs.attempt_count }}
      branch: ${{ steps.check.outputs.branch }}
      run_id: ${{ steps.get-pr.outputs.run_id }}
      run_url: ${{ steps.get-pr.outputs.run_url }}

    steps:
      - name: Get PR info from workflow_run
        id: get-pr
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            // 获取触发 workflow 的 PR 信息
            const headBranch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;

            // 直接从 workflow_run 事件获取 run ID 和 URL
            const runId = context.payload.workflow_run.id;
            const runUrl = context.payload.workflow_run.html_url;
            core.setOutput('run_id', runId);
            core.setOutput('run_url', runUrl);
            console.log(`CI Run ID: ${runId}`);
            console.log(`CI Run URL: ${runUrl}`);

            // 查找对应的 PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${headBranch}`,
              state: 'open'
            });

            if (prs.length > 0) {
              core.setOutput('pr_number', prs[0].number);
              core.setOutput('branch', headBranch);
              return prs[0].number;
            }
            return null;

      - name: Get PR info from comment
        id: get-pr-comment
        if: github.event_name == 'issue_comment'
        run: |
          echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Check fix attempt count
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.get-pr.outputs.pr_number }}' || '${{ steps.get-pr-comment.outputs.pr_number }}';

            if (!prNumber) {
              core.setOutput('should_fix', 'false');
              console.log('No PR found, skipping fix');
              return;
            }

            // 获取 PR 评论，统计修复尝试次数
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber)
            });

            // 统计 Claude 修复尝试的次数
            const fixAttempts = comments.filter(c =>
              c.body.includes('🔧 Claude CI Auto-Fix Attempt')
            ).length;

            const maxAttempts = parseInt('${{ env.MAX_FIX_ATTEMPTS }}');
            const shouldFix = fixAttempts < maxAttempts;

            core.setOutput('should_fix', shouldFix.toString());
            core.setOutput('pr_number', prNumber);
            core.setOutput('attempt_count', (fixAttempts + 1).toString());
            core.setOutput('branch', '${{ steps.get-pr.outputs.branch }}' || '');

            console.log(`PR #${prNumber}: Fix attempt ${fixAttempts + 1}/${maxAttempts}`);

            if (!shouldFix) {
              // 已达到最大尝试次数，添加评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: `## ❌ CI Auto-Fix Failed\n\nClaude has attempted to fix CI issues ${maxAttempts} times without success.\n\n**Manual intervention required.** Please review the CI failures and fix them manually.\n\n<details>\n<summary>What was tried</summary>\n\nClaude analyzed the CI failures and attempted automatic fixes, but the issues could not be resolved automatically. This may be due to:\n- Complex code changes required\n- Issues outside the scope of automatic fixes\n- Conflicting requirements\n\n</details>`
              });
            }

  # 使用 Claude 修复 CI 问题
  claude-fix:
    needs: check-if-fix-needed
    if: needs.check-if-fix-needed.outputs.should_fix == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-if-fix-needed.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Post start comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ needs.check-if-fix-needed.outputs.pr_number }}';
            const attempt = '${{ needs.check-if-fix-needed.outputs.attempt_count }}';
            const maxAttempts = '${{ env.MAX_FIX_ATTEMPTS }}';
            const runId = '${{ needs.check-if-fix-needed.outputs.run_id }}';
            const runUrl = '${{ needs.check-if-fix-needed.outputs.run_url }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
              body: `## 🔧 Claude CI Auto-Fix Attempt ${attempt}/${maxAttempts}\n\nAnalyzing CI failures and attempting automatic fix...\n\n📋 **Failed CI Run**: [#${runId}](${runUrl})\n\n⏳ This may take a few minutes.`
            });

      - name: Collect CI failure details
        id: failure-details
        uses: actions/github-script@v7
        with:
          script: |
            const runId = '${{ needs.check-if-fix-needed.outputs.run_id }}';

            // 获取所有 jobs
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: parseInt(runId),
            });

            // 筛选失败的 jobs
            const failedJobs = jobs.jobs.filter(job => job.conclusion === 'failure');

            let errorSummary = '## CI Failure Summary\n\n';
            errorSummary += `Total failed jobs: ${failedJobs.length}\n\n`;

            for (const job of failedJobs) {
              errorSummary += `### ❌ ${job.name}\n`;
              errorSummary += `- Job ID: ${job.id}\n`;
              errorSummary += `- URL: ${job.html_url}\n`;

              // 获取失败步骤
              const failedSteps = job.steps?.filter(step => step.conclusion === 'failure') || [];
              if (failedSteps.length > 0) {
                errorSummary += `- Failed steps:\n`;
                for (const step of failedSteps) {
                  errorSummary += `  - ${step.name}\n`;
                }
              }

              // 获取 annotations (包含具体错误信息)
              try {
                const { data: annotations } = await github.rest.checks.listAnnotations({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  check_run_id: job.id,
                });

                if (annotations.length > 0) {
                  errorSummary += `- Annotations:\n`;
                  for (const ann of annotations.slice(0, 20)) { // 限制最多 20 个
                    errorSummary += `  - [${ann.annotation_level}] ${ann.path}:${ann.start_line}: ${ann.message}\n`;
                  }
                  if (annotations.length > 20) {
                    errorSummary += `  - ... and ${annotations.length - 20} more annotations\n`;
                  }
                }
              } catch (e) {
                console.log(`Could not get annotations for job ${job.id}: ${e.message}`);
              }

              errorSummary += '\n';
            }

            // 保存到文件（避免环境变量长度限制）
            const fs = require('fs');
            fs.writeFileSync('ci-failure-summary.txt', errorSummary);

            core.setOutput('has_failures', failedJobs.length > 0);
            core.setOutput('failed_job_count', failedJobs.length);
            console.log(errorSummary);

      - name: Run Claude Code Fix
        id: claude-fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 允许 claude bot 触发的工作流运行（CI 可能由 bot 推送触发）
          allowed_bots: 'claude,github-actions'
          additional_permissions: |
            actions: read
            checks: read
          # 允许 Claude 运行必要的工具来修复 CI
          claude_args: >-
            --allowedTools "Bash"
            --allowedTools "Edit"
            --allowedTools "Write"
            --allowedTools "Read"
            --allowedTools "Glob"
            --allowedTools "Grep"
            --allowedTools "WebFetch"
            --allowedTools "WebSearch"
          prompt: |
            CI workflow has failed on this PR. Here is the failed CI run information:

            - **Run ID**: ${{ needs.check-if-fix-needed.outputs.run_id }}
            - **Run URL**: ${{ needs.check-if-fix-needed.outputs.run_url }}
            - **Branch**: ${{ needs.check-if-fix-needed.outputs.branch }}
            - **Failed Jobs**: ${{ steps.failure-details.outputs.failed_job_count }}

            ## Step 1: Read the pre-collected error summary

            A summary of CI failures has been collected. Read it first:
            ```
            cat ci-failure-summary.txt
            ```

            This file contains:
            - All failed job names and IDs
            - Failed step names within each job
            - Annotations with specific error locations (file:line) and messages

            ## Step 2: Get detailed logs if needed

            If the summary doesn't have enough detail, get the full logs:

            - Overview of the CI run:
              `gh run view ${{ needs.check-if-fix-needed.outputs.run_id }}`

            - Failed job logs (may be truncated for large outputs):
              `gh run view ${{ needs.check-if-fix-needed.outputs.run_id }} --log-failed`

            - For a specific job's full log:
              `gh api repos/${{ github.repository }}/actions/jobs/{job_id}/logs`

            ## Step 3: Fix the issues

            Common issues and fixes:
            - **Code formatting**: run `cargo fmt --all`
            - **Clippy warnings**: run `cargo clippy --all-targets --all-features` to see warnings, then fix them
            - **Test failures**: check test output and fix the code
            - **Build errors**: check compilation errors
            - **Security/license issues**: check deny.toml configuration

            ## Step 4: Verify and commit

            1. Run the relevant check locally to verify the fix
            2. Commit and push the fix

            ## Important guidelines

            - Focus only on fixing the CI failure, don't make unrelated changes
            - If it's a configuration issue (like deny.toml), fix the config
            - If it's a code issue, make minimal changes to fix it
            - If the issue cannot be fixed automatically (e.g., requires human decision), explain why in a comment

      - name: Check if new commits were pushed
        id: check-commits
        run: |
          # 获取远程最新状态
          git fetch origin ${{ needs.check-if-fix-needed.outputs.branch }}

          # 检查本地是否有未推送的提交
          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse origin/${{ needs.check-if-fix-needed.outputs.branch }})

          if [ "$LOCAL_HEAD" != "$REMOTE_HEAD" ]; then
            # 检查远程是否比触发时有新提交
            TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
            if [ "$REMOTE_HEAD" != "$TRIGGER_SHA" ]; then
              echo "has_new_commits=true" >> $GITHUB_OUTPUT
              echo "New commits detected: $REMOTE_HEAD vs trigger $TRIGGER_SHA"
            else
              echo "has_new_commits=false" >> $GITHUB_OUTPUT
              echo "No new commits pushed"
            fi
          else
            # 检查远程是否有新提交
            TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
            if [ "$REMOTE_HEAD" != "$TRIGGER_SHA" ]; then
              echo "has_new_commits=true" >> $GITHUB_OUTPUT
            else
              echo "has_new_commits=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post result comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ needs.check-if-fix-needed.outputs.pr_number }}';
            const attempt = '${{ needs.check-if-fix-needed.outputs.attempt_count }}';
            const maxAttempts = '${{ env.MAX_FIX_ATTEMPTS }}';
            const claudeSuccess = '${{ steps.claude-fix.outcome }}' === 'success';
            const hasNewCommits = '${{ steps.check-commits.outputs.has_new_commits }}' === 'true';

            let body;
            if (claudeSuccess && hasNewCommits) {
              body = `## ✅ Fix Attempt ${attempt} Complete\n\nClaude has pushed fixes. CI will re-run automatically.\n\nIf CI still fails, another fix attempt will be made (up to ${maxAttempts} attempts).`;
            } else if (claudeSuccess && !hasNewCommits) {
              body = `## ⚠️ Fix Attempt ${attempt} - No Automatic Fix Available\n\nClaude analyzed the CI failures but could not automatically fix them.\n\n**Manual intervention required.** Please review the CI failures and fix them manually.\n\nPossible reasons:\n- The issue requires human decision or design choices\n- The fix is outside the scope of automatic repairs\n- Complex refactoring is needed`;
            } else {
              body = `## ❌ Fix Attempt ${attempt} Failed\n\nClaude encountered problems while attempting to fix. Please check the workflow logs for details.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
              body: body
            });

  # CI 成功后的清理
  success-notification:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check if this was a fix
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch;

            // 查找对应的 PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${headBranch}`,
              state: 'open'
            });

            if (prs.length === 0) return;

            const prNumber = prs[0].number;

            // 检查是否有之前的修复尝试
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const hadFixAttempts = comments.some(c =>
              c.body.includes('🔧 Claude CI Auto-Fix Attempt')
            );

            if (hadFixAttempts) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## 🎉 CI Fixed Successfully!\n\nClaude's automatic fix resolved the CI issues. All checks are now passing.\n\nThis PR is ready for review.`
              });
            }
