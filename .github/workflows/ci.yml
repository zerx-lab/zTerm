name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # 代码质量检查
  code-quality:
    name: 代码质量检查 (格式化 & Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 检查代码格式
        run: cargo fmt --all -- --check

      - name: Clippy 静态分析 (严格模式)
        run: |
          cargo clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -W clippy::all \
            -W clippy::pedantic \
            -W clippy::nursery \
            -W clippy::cargo

  # 安全漏洞扫描
  security-audit:
    name: 安全漏洞扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 cargo-deny
        run: cargo install cargo-deny --locked

      - name: 检查安全漏洞和许可证
        run: |
          # 使用 deny.toml 配置进行检查（已配置忽略上游依赖的 unmaintained 警告）
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check sources
          cargo deny check bans

  # 未使用依赖检测
  unused-deps:
    name: 检测未使用的依赖
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@nightly

      - name: 安装 cargo-machete
        run: cargo install cargo-machete --locked

      - name: 检查未使用的依赖
        run: cargo machete

  # 编译检查 (多平台)
  build:
    name: 构建检查 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Linux 依赖安装
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 检查编译 (快速模式)
        run: cargo check --workspace --all-targets --all-features

      - name: 完整构建
        run: cargo build --workspace --all-targets --all-features --release

  # 测试 (包含覆盖率)
  test:
    name: 单元测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Linux 依赖安装
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 运行测试
        run: cargo test --workspace --all-features -- --nocapture

  # 代码覆盖率 (仅 Linux)
  coverage:
    name: 测试覆盖率
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Linux 依赖安装
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 安装 cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: 生成覆盖率报告
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: 上传覆盖率到 Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  # 文档生成检查
  docs:
    name: 文档生成检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Linux 依赖安装
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: 生成文档
        run: cargo doc --workspace --all-features --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # 内存泄漏检查 (使用 Miri)
  miri:
    name: Miri 内存安全检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链 (Nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: 运行 Miri 测试
        run: cargo miri test --workspace
        continue-on-error: true  # Miri 可能会报告误报

  # 最终状态检查
  ci-success:
    name: CI 通过
    if: always()
    needs:
      - code-quality
      - security-audit
      - unused-deps
      - build
      - test
      - coverage
      - docs
    runs-on: ubuntu-latest
    steps:
      - name: 检查所有任务状态
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" || \
                "${{ needs.security-audit.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ CI 检查失败"
            exit 1
          fi
          echo "✅ 所有 CI 检查通过"
